<!doctype html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
  {{ partial "head.html" . }}
  <body>
    {{ partial "header.html" . }}
    <main class="site-main{{ if eq .Section "docs" }} has-sidebar{{ end }}">
      {{ if eq .Section "docs" }}
        <aside class="sidebar">{{ partial "docs-sidebar.html" . }}</aside>
        <div class="doc-content">
          {{ block "main" . }}{{ end }}
        </div>
      {{ else }}
        {{ block "main" . }}{{ end }}
      {{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
