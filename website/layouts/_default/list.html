{{ define "main" }}
  <article class="prose">
    <header class="doc-header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
    </header>
    {{ .Content }}
    {{ $children := where .Site.RegularPages "Section" "docs" }}
    {{ $here := .RelPermalink }}
    <div class="card-grid">
      {{ range sort .Pages "Weight" }}
        <a class="card" href="{{ .RelPermalink }}">
          <h3>{{ .Title }}</h3>
          {{ with .Description }}<p>{{ . }}</p>{{ end }}
        </a>
      {{ end }}
    </div>
  </article>
{{ end }}
