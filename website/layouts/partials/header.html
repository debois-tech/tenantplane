<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ "/" | relURL }}">
      <img class="brand-logo" src="{{ "img/logo.svg" | relURL }}" alt="" />
      <span class="brand-name">tenantplane</span>
    </a>
    <nav class="nav">
      {{ range .Site.Menus.main }}
        {{ if .Params.icon }}
          <a class="nav-icon-link" href="{{ .URL | relURL }}" aria-label="{{ .Name }}"{{ if .Params.external }} target="_blank" rel="noopener"{{ end }}>{{ partial "icon.html" .Params.icon }}<span>{{ .Name }}</span></a>
        {{ else }}
          <a href="{{ .URL | relURL }}"{{ if .Params.external }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
  </div>
</header>
