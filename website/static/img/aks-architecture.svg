<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-label="tenantplane on Azure AKS" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <style>
    .box { fill: #f7f8fb; stroke: #d8dce6; stroke-width: 1.5; }
    .accent { fill: #e7f4f1; stroke: #0e8276; stroke-width: 2; }
    .amber { fill: #fbeee7; stroke: #d95a35; stroke-width: 1.5; }
    .container { fill: none; stroke: #c4cad6; stroke-width: 1.5; stroke-dasharray: 6 5; }
    .inner { fill: none; stroke: #c4cad6; stroke-width: 1.2; stroke-dasharray: 4 4; }
    .t { fill: #1a1c23; }
    .m { fill: #5b6472; }
    .a { fill: #0e8276; }
    .arrow { stroke: #98a2b3; stroke-width: 1.8; fill: none; }
    .dashed { stroke-dasharray: 5 4; }
    text { font-size: 14px; }
    .small { font-size: 12px; }
    .tiny { font-size: 11px; }
    .cap { font-size: 12px; font-weight: 700; letter-spacing: .06em; }
    .title { font-weight: 700; }
    .flow { fill: #0e8276; }
    .flow-opt { fill: #d95a35; }
    @media (prefers-color-scheme: dark) {
      .flow { fill: #5ee6d3; }
      .box { fill: #161a24; stroke: #2a3040; }
      .accent { fill: #0f2a2b; stroke: #4dd6c5; }
      .amber { fill: #2b1b13; stroke: #d95a35; }
      .container { stroke: #333a4d; }
      .inner { stroke: #333a4d; }
      .t { fill: #e8eaf0; }
      .m { fill: #9aa4b6; }
      .a { fill: #5ee6d3; }
      .arrow { stroke: #4b5468; }
    }
  </style>
  <defs>
    <marker id="aksah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#98a2b3"/>
    </marker>
  </defs>

  <!-- Registry -->
  <rect class="box" x="30" y="70" width="164" height="70" rx="10"/>
  <text class="title t" x="112" y="99" text-anchor="middle">Azure ACR</text>
  <text class="tiny m" x="112" y="119" text-anchor="middle">manager image</text>
  <path class="arrow" d="M194,105 L256,105" marker-end="url(#aksah)"/>
  <text class="tiny m" x="225" y="95" text-anchor="middle">pull</text>

  <!-- EKS cluster -->
  <text class="cap m" x="270" y="34">AZURE AKS CLUSTER</text>
  <rect class="container" x="258" y="44" width="482" height="366" rx="14"/>

  <!-- Controller -->
  <rect class="accent" x="286" y="70" width="180" height="70" rx="10"/>
  <text class="title a" x="376" y="99" text-anchor="middle">tenantplane</text>
  <text class="title a" x="376" y="119" text-anchor="middle">controller</text>

  <!-- Tenant namespace -->
  <text class="cap m" x="298" y="176">TENANT NAMESPACE</text>
  <rect class="inner" x="286" y="184" width="426" height="200" rx="11"/>

  <rect class="box" x="306" y="208" width="180" height="70" rx="9"/>
  <text class="title t" x="396" y="234" text-anchor="middle">k3s control plane</text>
  <text class="tiny m" x="396" y="254" text-anchor="middle">PVC via Azure Disk CSI</text>

  <rect class="box" x="512" y="208" width="180" height="70" rx="9"/>
  <text class="title t" x="602" y="234" text-anchor="middle">Synced workloads</text>
  <text class="tiny m" x="602" y="254" text-anchor="middle">deterministic host objects</text>

  <rect class="amber" x="306" y="298" width="386" height="60" rx="9"/>
  <text class="small title t" x="499" y="322" text-anchor="middle">Isolation boundary</text>
  <text class="tiny m" x="499" y="340" text-anchor="middle">default-deny NetworkPolicy (Azure/Calico policy) · Quota · LimitRange · PSA</text>

  <path class="arrow" d="M376,140 L376,182" marker-end="url(#aksah)"/>
  <text class="tiny m" x="404" y="162">reconciles</text>

  <!-- EBS -->
  <rect class="box" x="790" y="238" width="160" height="76" rx="10"/>
  <text class="title t" x="870" y="266" text-anchor="middle">Azure Disk</text>
  <text class="tiny m" x="870" y="286" text-anchor="middle">managed-csi class</text>
  <path class="arrow" d="M740,243 L788,258" marker-end="url(#aksah)"/>
  <text class="tiny m" x="758" y="236" text-anchor="middle">CSI</text>

  <!-- NLB -->
  <rect class="amber" x="790" y="70" width="160" height="86" rx="10"/>
  <text class="title t" x="870" y="98" text-anchor="middle">Azure Load</text>
  <text class="title t" x="870" y="116" text-anchor="middle">Balancer</text>
  <text class="tiny m" x="870" y="138" text-anchor="middle">optional expose · :6443</text>
  <path class="arrow dashed" d="M486,225 C740,225 760,140 788,120" marker-end="url(#aksah)"/>
  <text class="tiny m" x="742" y="176" text-anchor="middle">tenant API</text>

  <text class="tiny m" x="870" y="42" text-anchor="middle">external clients</text>
  <path class="arrow dashed" d="M870,48 L870,68" marker-end="url(#aksah)"/>
  <g class="flow-layer" aria-hidden="true">
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.00s" repeatCount="indefinite" path="M194,105 L256,105"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.75s" repeatCount="indefinite" path="M376,140 L376,182"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.20s" repeatCount="indefinite" path="M740,243 L788,258"/></circle>
    <circle class="flow-opt" r="3.1"><animateMotion dur="3.00s" begin="-1.35s" repeatCount="indefinite" path="M486,225 C740,225 760,140 788,120"/></circle>
    <circle class="flow-opt" r="3.1"><animateMotion dur="1.30s" begin="-0.40s" repeatCount="indefinite" path="M870,48 L870,68"/></circle>
  </g>
</svg>
