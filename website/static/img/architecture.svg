<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" role="img" aria-label="tenantplane architecture diagram" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <style>
    .bg { fill: transparent; }
    .box { fill: #f7f8fb; stroke: #d8dce6; stroke-width: 1.5; }
    .accent { fill: #e7f4f1; stroke: #0e8276; stroke-width: 2; }
    .amber { fill: #fbeee7; stroke: #d95a35; stroke-width: 1.5; }
    .container { fill: none; stroke: #c4cad6; stroke-width: 1.5; stroke-dasharray: 6 5; }
    .t { fill: #1a1c23; }
    .m { fill: #5b6472; }
    .a { fill: #0e8276; }
    .arrow { stroke: #98a2b3; stroke-width: 1.8; fill: none; }
    .title { font-weight: 700; }
    text { font-size: 14px; }
    .small { font-size: 12px; }
    .cap { font-size: 12px; font-weight: 700; letter-spacing: .06em; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #161a24; stroke: #2a3040; }
      .accent { fill: #0f2a2b; stroke: #4dd6c5; }
      .amber { fill: #2b1b13; stroke: #d95a35; }
      .container { stroke: #333a4d; }
      .t { fill: #e8eaf0; }
      .m { fill: #9aa4b6; }
      .a { fill: #5ee6d3; }
      .arrow { stroke: #4b5468; }
    }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#98a2b3"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="470"/>

  <!-- Column 1: Custom Resources -->
  <text class="cap m" x="30" y="34">USER-FACING API</text>
  <rect class="box" x="30" y="48" width="180" height="52" rx="9"/>
  <text class="title t" x="120" y="72" text-anchor="middle">TenantCluster</text>
  <text class="small m" x="120" y="90" text-anchor="middle">one virtual tenant</text>

  <rect class="box" x="30" y="118" width="180" height="52" rx="9"/>
  <text class="title t" x="120" y="142" text-anchor="middle">IsolationProfile</text>
  <text class="small m" x="120" y="160" text-anchor="middle">security boundary</text>

  <rect class="box" x="30" y="188" width="180" height="52" rx="9"/>
  <text class="title t" x="120" y="212" text-anchor="middle">SyncPolicy</text>
  <text class="small m" x="120" y="230" text-anchor="middle">what crosses, how</text>

  <!-- Column 2: Controller -->
  <text class="cap m" x="300" y="34">CONTROL LOOP</text>
  <rect class="accent" x="300" y="48" width="180" height="192" rx="11"/>
  <text class="title a" x="390" y="132" text-anchor="middle">tenantplane</text>
  <text class="title a" x="390" y="152" text-anchor="middle">controller</text>
  <text class="small m" x="390" y="176" text-anchor="middle">reconciles &amp; records</text>

  <!-- arrows CRDs -> controller -->
  <path class="arrow" d="M210,74 C255,74 262,120 298,132" marker-end="url(#ah)"/>
  <path class="arrow" d="M210,144 L298,144" marker-end="url(#ah)"/>
  <path class="arrow" d="M210,214 C255,214 262,168 298,156" marker-end="url(#ah)"/>

  <!-- Host cluster container -->
  <text class="cap m" x="560" y="34">HOST CLUSTER NAMESPACE</text>
  <rect class="container" x="548" y="42" width="410" height="410" rx="14"/>

  <!-- Column 3: Outcomes -->
  <rect class="amber" x="568" y="62" width="200" height="86" rx="10"/>
  <text class="title t" x="668" y="88" text-anchor="middle">Isolation</text>
  <text class="small m" x="668" y="108" text-anchor="middle">NetworkPolicy · Quota</text>
  <text class="small m" x="668" y="124" text-anchor="middle">LimitRange · PSA labels</text>

  <rect class="box" x="568" y="164" width="200" height="86" rx="10"/>
  <text class="title t" x="668" y="190" text-anchor="middle">Control plane</text>
  <text class="small m" x="668" y="210" text-anchor="middle">k3s StatefulSet · Service</text>
  <text class="small m" x="668" y="226" text-anchor="middle">kubeconfig Secret · PVC (CSI)</text>

  <rect class="accent" x="568" y="266" width="200" height="86" rx="10"/>
  <text class="title a" x="668" y="292" text-anchor="middle">Sync engine</text>
  <text class="small m" x="668" y="312" text-anchor="middle">list → transform → apply</text>
  <text class="small m" x="668" y="328" text-anchor="middle">→ garbage-collect</text>

  <!-- controller -> outcomes -->
  <path class="arrow" d="M480,120 C520,120 528,105 566,105" marker-end="url(#ah)"/>
  <path class="arrow" d="M480,144 C520,144 528,207 566,207" marker-end="url(#ah)"/>
  <path class="arrow" d="M480,168 C520,168 528,309 566,309" marker-end="url(#ah)"/>

  <!-- External access (optional LoadBalancer, EKS/AKS/GKE annotations) -->
  <rect class="amber" x="808" y="56" width="132" height="72" rx="10"/>
  <text class="small title t" x="874" y="82" text-anchor="middle">External clients</text>
  <text class="small m" x="874" y="100" text-anchor="middle">optional</text>
  <text class="small m" x="874" y="116" text-anchor="middle">LoadBalancer</text>
  <path class="arrow" d="M768,178 C792,178 800,124 806,102" stroke-dasharray="5 4" marker-end="url(#ah)"/>

  <!-- Column 4: Result -->
  <rect class="box" x="808" y="164" width="132" height="188" rx="10"/>
  <text class="title t" x="874" y="212" text-anchor="middle">Host</text>
  <text class="title t" x="874" y="232" text-anchor="middle">objects</text>
  <text class="small m" x="874" y="258" text-anchor="middle">deterministic</text>
  <text class="small m" x="874" y="274" text-anchor="middle">names +</text>
  <text class="small m" x="874" y="290" text-anchor="middle">reverse-map</text>
  <text class="small m" x="874" y="306" text-anchor="middle">labels</text>

  <!-- sync -> host objects, and decisions -->
  <path class="arrow" d="M768,309 C788,309 792,258 806,258" marker-end="url(#ah)"/>

  <!-- Decision events callout -->
  <rect class="amber" x="568" y="378" width="372" height="52" rx="10"/>
  <text class="small title t" x="754" y="400" text-anchor="middle">Every action → a decision Event</text>
  <text class="small m" x="754" y="418" text-anchor="middle">“why does this host object exist?”</text>
  <path class="arrow" d="M668,352 L668,376" marker-end="url(#ah)"/>
  <path class="arrow" d="M874,352 C874,366 800,372 800,376" marker-end="url(#ah)"/>
</svg>
