<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="tenant clusters orbiting a host control plane" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <!-- Illustration: tenants as satellites orbiting the host control plane.
       Fixed deep-teal palette; original tenantplane identity. -->
  <rect x="0" y="0" width="520" height="360" rx="22" fill="#0b2229"/>

  <!-- orbital rings -->
  <g fill="none" stroke="#3fd9c2">
    <ellipse cx="260" cy="180" rx="215" ry="120" opacity="0.22" stroke-width="1.6"/>
    <ellipse cx="260" cy="180" rx="150" ry="82"  opacity="0.30" stroke-width="1.6"/>
    <ellipse cx="260" cy="180" rx="90"  ry="48"  opacity="0.38" stroke-width="1.6"/>
  </g>

  <!-- faint stars -->
  <g fill="#bfe6de">
    <circle cx="60"  cy="52"  r="1.6" opacity="0.35"/>
    <circle cx="452" cy="66"  r="1.4" opacity="0.30"/>
    <circle cx="486" cy="288" r="1.6" opacity="0.32"/>
    <circle cx="42"  cy="300" r="1.4" opacity="0.28"/>
    <circle cx="250" cy="38"  r="1.4" opacity="0.30"/>
    <circle cx="120" cy="330" r="1.3" opacity="0.26"/>
  </g>

  <!-- host control plane: core -->
  <circle cx="260" cy="180" r="44" fill="#0e3a3c"/>
  <circle cx="260" cy="180" r="44" fill="none" stroke="#4dd6c5" stroke-width="2.5"/>
  <circle cx="260" cy="180" r="16" fill="#ff7a52"/>
  <g stroke="#4dd6c5" stroke-width="2.4" stroke-linecap="round">
    <line x1="260" y1="150" x2="260" y2="140"/>
    <line x1="260" y1="210" x2="260" y2="220"/>
    <line x1="230" y1="180" x2="220" y2="180"/>
    <line x1="290" y1="180" x2="300" y2="180"/>
  </g>

  <!-- tenant satellites: hexagonal pods on the rings -->
  <g>
    <g transform="translate(110,142)">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#0e3a3c" stroke="#4dd6c5" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="#4dd6c5"/>
    </g>
    <g transform="translate(402,232)">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#0e3a3c" stroke="#4dd6c5" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="#ff7a52"/>
    </g>
    <g transform="translate(330,104)">
      <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="#0e3a3c" stroke="#ff7a52" stroke-width="2"/>
      <circle cx="0" cy="0" r="4.5" fill="#4dd6c5"/>
    </g>
    <g transform="translate(150,264)">
      <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="#0e3a3c" stroke="#4dd6c5" stroke-width="2"/>
      <circle cx="0" cy="0" r="4.5" fill="#4dd6c5"/>
    </g>
    <g transform="translate(430,128)">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="#0e3a3c" stroke="#4dd6c5" stroke-width="1.8"/>
      <circle cx="0" cy="0" r="4" fill="#ff7a52"/>
    </g>
  </g>

  <!-- sync beams from satellites to core -->
  <g stroke="#3fd9c2" stroke-width="1.4" stroke-dasharray="3 5" opacity="0.55" fill="none">
    <path d="M124 150 C 170 160, 190 168, 216 176"/>
    <path d="M388 226 C 350 214, 330 206, 304 194"/>
    <path d="M322 116 C 300 132, 288 144, 276 154"/>
    <path d="M162 256 C 196 236, 214 222, 228 208"/>
  </g>
</svg>
