<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 360" role="img" aria-label="Tenant clusters orbiting a host control plane" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" preserveAspectRatio="xMidYMid meet">
  <style>
    .ring { fill: none; stroke: #3fd9c2; stroke-width: 1.6; }
    .pod { fill: #0e3a3c; stroke: #4dd6c5; stroke-width: 2; }
    .podb { fill: #0e3a3c; stroke: #ff7a52; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="520" height="360" rx="22" fill="#0b2229"/>

  <!-- orbital ring paths (also used as motion paths) -->
  <path id="r1" class="ring" opacity="0.22" d="M45,180 a215,120 0 1,0 430,0 a215,120 0 1,0 -430,0"/>
  <path id="r2" class="ring" opacity="0.30" d="M110,180 a150,82 0 1,0 300,0 a150,82 0 1,0 -300,0"/>
  <path id="r3" class="ring" opacity="0.38" d="M170,180 a90,48 0 1,0 180,0 a90,48 0 1,0 -180,0"/>

  <!-- twinkling stars -->
  <g fill="#bfe6de">
    <circle cx="60" cy="52" r="1.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="452" cy="66" r="1.4"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="486" cy="288" r="1.6"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="42" cy="300" r="1.4"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="36" r="1.4"><animate attributeName="opacity" values="0.25;0.8;0.25" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="330" r="1.3"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- host control-plane core with a radar pulse -->
  <circle cx="260" cy="180" r="44" fill="none" stroke="#4dd6c5" stroke-width="2">
    <animate attributeName="r" values="44;70;44" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="180" r="44" fill="#0e3a3c" stroke="#4dd6c5" stroke-width="2.5"/>
  <g stroke="#4dd6c5" stroke-width="2.4" stroke-linecap="round">
    <line x1="260" y1="150" x2="260" y2="140"/><line x1="260" y1="210" x2="260" y2="220"/>
    <line x1="230" y1="180" x2="220" y2="180"/><line x1="290" y1="180" x2="300" y2="180"/>
  </g>
  <circle cx="260" cy="180" r="16" fill="#ff7a52">
    <animate attributeName="opacity" values="1;0.7;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- orbiting tenant satellites (hexagonal pods travelling their rings) -->
  <g>
    <polygon class="pod" points="0,-13 11,-6.5 11,6.5 0,13 -11,6.5 -11,-6.5"/>
    <circle r="4.5" fill="#4dd6c5"/>
    <animateMotion dur="26s" repeatCount="indefinite" rotate="0"><mpath xlink:href="#r1"/></animateMotion>
  </g>
  <g>
    <polygon class="podb" points="0,-11 9,-5.5 9,5.5 0,11 -9,5.5 -9,-5.5"/>
    <circle r="4" fill="#ff7a52"/>
    <animateMotion dur="26s" begin="-13s" repeatCount="indefinite" rotate="0"><mpath xlink:href="#r1"/></animateMotion>
  </g>
  <g>
    <polygon class="pod" points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6"/>
    <circle r="4.5" fill="#4dd6c5"/>
    <animateMotion dur="18s" begin="-5s" repeatCount="indefinite" rotate="0"><mpath xlink:href="#r2"/></animateMotion>
  </g>
  <g>
    <polygon class="pod" points="0,-10 8,-5 8,5 0,10 -8,5 -8,-5"/>
    <circle r="4" fill="#4dd6c5"/>
    <animateMotion dur="12s" begin="-8s" repeatCount="indefinite" rotate="0"><mpath xlink:href="#r3"/></animateMotion>
  </g>
</svg>
