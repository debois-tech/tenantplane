<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <!-- Hero backdrop: a starfield only. The orbital rings are rendered as
       CSS-rotated elements in the page (an SVG used as a CSS background does not
       animate), so this file stays a static, textured backdrop. -->

  <!-- constellation nodes -->
  <g>
    <circle cx="220" cy="392" r="5" fill="#2ee6c8" opacity="0.55"/>
    <circle cx="1105" cy="530" r="4" fill="#2ee6c8" opacity="0.45"/>
    <circle cx="405" cy="562" r="5" fill="#ff8a66" opacity="0.55"/>
    <circle cx="985" cy="372" r="4" fill="#2ee6c8" opacity="0.5"/>
    <circle cx="612" cy="336" r="3.5" fill="#ff8a66" opacity="0.45"/>
    <circle cx="836" cy="586" r="4" fill="#2ee6c8" opacity="0.4"/>
  </g>

  <!-- faint stars -->
  <g fill="#cfe9e4">
    <circle cx="140" cy="120" r="1.6" opacity="0.30"/>
    <circle cx="320" cy="70"  r="1.3" opacity="0.22"/>
    <circle cx="520" cy="140" r="1.5" opacity="0.26"/>
    <circle cx="760" cy="80"  r="1.3" opacity="0.22"/>
    <circle cx="950" cy="150" r="1.6" opacity="0.30"/>
    <circle cx="1130" cy="90" r="1.3" opacity="0.22"/>
    <circle cx="1280" cy="190" r="1.5" opacity="0.26"/>
    <circle cx="90"  cy="300" r="1.4" opacity="0.22"/>
    <circle cx="1330" cy="330" r="1.4" opacity="0.24"/>
    <circle cx="240" cy="210" r="1.2" opacity="0.20"/>
    <circle cx="1060" cy="240" r="1.2" opacity="0.20"/>
    <circle cx="660" cy="200" r="1.3" opacity="0.24"/>
  </g>
</svg>
