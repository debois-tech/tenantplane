<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img" aria-label="tenantplane sync convergence pass" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <style>
    .box { fill: #f7f8fb; stroke: #d8dce6; stroke-width: 1.5; }
    .accent { fill: #e7f4f1; stroke: #0e8276; stroke-width: 2; }
    .side { fill: #fbfbfd; stroke: #c4cad6; stroke-width: 1.5; stroke-dasharray: 6 5; }
    .t { fill: #1a1c23; }
    .m { fill: #5b6472; }
    .a { fill: #0e8276; }
    .arrow { stroke: #98a2b3; stroke-width: 2; fill: none; }
    text { font-size: 14px; }
    .small { font-size: 12px; }
    .cap { font-size: 12px; font-weight: 700; letter-spacing: .06em; }
    .num { font-size: 13px; font-weight: 700; }
    .title { font-weight: 700; }
    .flow { fill: #0e8276; }
    .flow-opt { fill: #d95a35; }
    @media (prefers-color-scheme: dark) {
      .flow { fill: #5ee6d3; }
      .box { fill: #161a24; stroke: #2a3040; }
      .accent { fill: #0f2a2b; stroke: #4dd6c5; }
      .side { fill: #12151d; stroke: #333a4d; }
      .t { fill: #e8eaf0; }
      .m { fill: #9aa4b6; }
      .a { fill: #5ee6d3; }
      .arrow { stroke: #4b5468; }
    }
  </style>
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#98a2b3"/>
    </marker>
  </defs>

  <!-- Virtual cluster (source) -->
  <rect class="side" x="20" y="70" width="120" height="150" rx="12"/>
  <text class="cap m" x="80" y="58" text-anchor="middle">TENANT</text>
  <text class="title t" x="80" y="140" text-anchor="middle">Virtual</text>
  <text class="title t" x="80" y="160" text-anchor="middle">objects</text>

  <!-- Pipeline -->
  <g>
    <rect class="box" x="190" y="95" width="140" height="100" rx="11"/>
    <circle class="accent" cx="212" cy="117" r="13"/>
    <text class="num a" x="212" y="122" text-anchor="middle">1</text>
    <text class="title t" x="260" y="140" text-anchor="middle">List</text>
    <text class="small m" x="260" y="160" text-anchor="middle">skip system</text>
    <text class="small m" x="260" y="176" text-anchor="middle">namespaces</text>

    <rect class="box" x="360" y="95" width="140" height="100" rx="11"/>
    <circle class="accent" cx="382" cy="117" r="13"/>
    <text class="num a" x="382" y="122" text-anchor="middle">2</text>
    <text class="title t" x="430" y="140" text-anchor="middle">Transform</text>
    <text class="small m" x="430" y="160" text-anchor="middle">rename + labels,</text>
    <text class="small m" x="430" y="176" text-anchor="middle">strip host fields</text>

    <rect class="box" x="530" y="95" width="140" height="100" rx="11"/>
    <circle class="accent" cx="552" cy="117" r="13"/>
    <text class="num a" x="552" y="122" text-anchor="middle">3</text>
    <text class="title t" x="600" y="140" text-anchor="middle">Apply</text>
    <text class="small m" x="600" y="160" text-anchor="middle">create or</text>
    <text class="small m" x="600" y="176" text-anchor="middle">update</text>

    <rect class="box" x="700" y="95" width="140" height="100" rx="11"/>
    <circle class="accent" cx="722" cy="117" r="13"/>
    <text class="num a" x="722" y="122" text-anchor="middle">4</text>
    <text class="title t" x="770" y="140" text-anchor="middle">GC</text>
    <text class="small m" x="770" y="160" text-anchor="middle">delete</text>
    <text class="small m" x="770" y="176" text-anchor="middle">orphans</text>
  </g>

  <!-- Host (target) -->
  <rect class="side" x="860" y="70" width="110" height="150" rx="12"/>
  <text class="cap m" x="915" y="58" text-anchor="middle">HOST</text>
  <text class="title t" x="915" y="140" text-anchor="middle">Host</text>
  <text class="title t" x="915" y="160" text-anchor="middle">objects</text>

  <!-- arrows -->
  <path class="arrow" d="M140,145 L188,145" marker-end="url(#ah2)"/>
  <path class="arrow" d="M330,145 L358,145" marker-end="url(#ah2)"/>
  <path class="arrow" d="M500,145 L528,145" marker-end="url(#ah2)"/>
  <path class="arrow" d="M670,145 L698,145" marker-end="url(#ah2)"/>
  <path class="arrow" d="M840,145 L858,145" marker-end="url(#ah2)"/>

  <!-- decision band -->
  <rect class="accent" x="190" y="235" width="650" height="40" rx="10"/>
  <text class="title a" x="515" y="259" text-anchor="middle">Each step records an explainable Decision  ·  Create · Update · Delete · Skip</text>
  <path class="arrow" d="M260,195 L260,233" marker-end="url(#ah2)"/>
  <path class="arrow" d="M430,195 L430,233" marker-end="url(#ah2)"/>
  <path class="arrow" d="M600,195 L600,233" marker-end="url(#ah2)"/>
  <path class="arrow" d="M770,195 L770,233" marker-end="url(#ah2)"/>
  <g class="flow-layer" aria-hidden="true">
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.00s" repeatCount="indefinite" path="M140,145 L188,145"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.75s" repeatCount="indefinite" path="M330,145 L358,145"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.20s" repeatCount="indefinite" path="M500,145 L528,145"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.95s" repeatCount="indefinite" path="M670,145 L698,145"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.40s" repeatCount="indefinite" path="M840,145 L858,145"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-1.15s" repeatCount="indefinite" path="M260,195 L260,233"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.60s" repeatCount="indefinite" path="M430,195 L430,233"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.05s" repeatCount="indefinite" path="M600,195 L600,233"/></circle>
    <circle class="flow" r="3.1"><animateMotion dur="1.30s" begin="-0.80s" repeatCount="indefinite" path="M770,195 L770,233"/></circle>
  </g>
</svg>
