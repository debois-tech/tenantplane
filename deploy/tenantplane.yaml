apiVersion: v1
kind: Namespace
metadata:
  name: tenantplane-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenantplane-controller
  namespace: tenantplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenantplane-controller
rules:
  - apiGroups: ["tenantplane.io"]
    resources: ["tenantclusters", "tenantclusters/status", "isolationprofiles", "syncpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "serviceaccounts", "services", "configmaps", "secrets", "pods", "resourcequotas", "limitranges", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenantplane-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenantplane-controller
subjects:
  - kind: ServiceAccount
    name: tenantplane-controller
    namespace: tenantplane-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenantplane-controller
  namespace: tenantplane-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tenantplane-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenantplane-controller
    spec:
      serviceAccountName: tenantplane-controller
      containers:
        - name: manager
          image: tenantplane/manager:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
