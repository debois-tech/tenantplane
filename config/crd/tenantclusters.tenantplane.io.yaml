apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenantclusters.tenantplane.io
spec:
  group: tenantplane.io
  scope: Namespaced
  names:
    plural: tenantclusters
    singular: tenantcluster
    kind: TenantCluster
    shortNames:
      - tc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - mode
                - kubernetesVersion
                - isolationProfileRef
                - syncPolicyRef
                - controlPlane
              properties:
                mode:
                  type: string
                  enum: ["shared", "dedicated", "private"]
                  x-kubernetes-validations:
                    - rule: "self == 'shared'"
                      message: 'only "shared" is implemented today; "dedicated" and "private" are on the roadmap and are rejected rather than silently reconciled as shared'
                kubernetesVersion:
                  type: string
                  x-kubernetes-validations:
                    - rule: "self.matches('^v1\\\\.(28|29|30|31|32|33)(\\\\.[0-9]+)?$')"
                      message: 'only v1.28-v1.33 have a known k3s image (patch version is optional and ignored); other versions are rejected rather than silently falling back to a default image'
                isolationProfileRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                syncPolicyRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                controlPlane:
                  type: object
                  required: ["replicas", "datastore"]
                  properties:
                    replicas:
                      type: integer
                      minimum: 1
                      maximum: 1
                      description: Multi-replica (HA) control planes are on the roadmap; until then a single replica is enforced rather than silently scaled down.
                    datastore:
                      type: object
                      required: ["type"]
                      properties:
                        type:
                          type: string
                          enum: ["sqlite", "etcd", "postgres"]
                          x-kubernetes-validations:
                            - rule: "self == 'sqlite'"
                              message: 'only "sqlite" is implemented today; "etcd" and "postgres" are on the roadmap'
                    storage:
                      type: object
                      properties:
                        className:
                          type: string
                          description: StorageClass for the control-plane volume (e.g. gp3 on EKS, managed-csi on AKS, standard-rwo on GKE). Empty uses the cluster default.
                        size:
                          type: string
                          description: Requested volume size (default 1Gi).
                          pattern: '^[0-9]+(\.[0-9]+)?(m|k|M|G|T|P|E|Ki|Mi|Gi|Ti|Pi|Ei)?$'
                    expose:
                      type: object
                      properties:
                        loadBalancer:
                          type: boolean
                          description: Publish the tenant API server through a Service of type LoadBalancer.
                        annotations:
                          type: object
                          additionalProperties:
                            type: string
                          description: Annotations applied to the LoadBalancer Service (cloud-specific behavior).
                    extraTLSSANs:
                      type: array
                      items:
                        type: string
                      description: Additional TLS subject alternative names for the tenant API server certificate.
                networking:
                  type: object
                  properties:
                    podCIDR:
                      type: string
                    serviceCIDR:
                      type: string
                    egressPolicy:
                      type: string
                      enum: ["deny-by-default", "allow-same-tenant", "unrestricted"]
                migration:
                  type: object
                  properties:
                    allowModeChange:
                      type: boolean
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                      description: Kubernetes resource quantity (e.g. 500m, 2). Validated here so a typo cannot fail the controller.
                      pattern: '^[0-9]+(\.[0-9]+)?(m|k|M|G|T|P|E|Ki|Mi|Gi|Ti|Pi|Ei)?$'
                    memory:
                      type: string
                      description: Kubernetes resource quantity (e.g. 512Mi, 2Gi). Validated here so a typo cannot fail the controller.
                      pattern: '^[0-9]+(\.[0-9]+)?(m|k|M|G|T|P|E|Ki|Mi|Gi|Ti|Pi|Ei)?$'
            status:
              type: object
              properties:
                phase:
                  type: string
                endpoint:
                  type: string
                externalEndpoint:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string

