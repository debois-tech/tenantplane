apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: isolationprofiles.tenantplane.io
spec:
  group: tenantplane.io
  scope: Cluster
  names:
    plural: isolationprofiles
    singular: isolationprofile
    kind: IsolationProfile
    shortNames:
      - iprof
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["level", "controls"]
              properties:
                level:
                  type: string
                  enum: ["baseline", "restricted", "sandboxed"]
                controls:
                  type: object
                  required:
                    - podSecurity
                    - defaultDenyNetworkPolicy
                    - requireResourceRequests
                    - blockHostPathVolumes
                    - blockPrivilegedContainers
                    - apiFairness
                  properties:
                    podSecurity:
                      type: string
                      enum: ["baseline", "restricted"]
                    defaultDenyNetworkPolicy:
                      type: boolean
                    requireResourceRequests:
                      type: boolean
                    runtimeClassName:
                      type: string
                    blockHostPathVolumes:
                      type: boolean
                    blockPrivilegedContainers:
                      type: boolean
                    apiFairness:
                      type: string
                      enum: ["tenant", "tenant-strict"]

