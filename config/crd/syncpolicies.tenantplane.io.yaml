apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: syncpolicies.tenantplane.io
spec:
  group: tenantplane.io
  scope: Cluster
  names:
    plural: syncpolicies
    singular: syncpolicy
    kind: SyncPolicy
    shortNames:
      - sp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["conflictPolicy", "resources"]
              properties:
                conflictPolicy:
                  type: string
                  enum: ["manual", "tenant-wins", "host-wins"]
                driftDetection:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    interval:
                      type: string
                explain:
                  type: object
                  properties:
                    recordDecisions:
                      type: boolean
                    retain:
                      type: integer
                      minimum: 0
                resources:
                  type: array
                  items:
                    type: object
                    required: ["apiVersion", "kind", "direction"]
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      direction:
                        type: string
                        enum: ["toHost", "fromHost", "bidirectional"]

