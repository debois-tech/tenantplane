apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: syncpolicies.tenantplane.io
spec:
  group: tenantplane.io
  scope: Cluster
  names:
    plural: syncpolicies
    singular: syncpolicy
    kind: SyncPolicy
    shortNames:
      - sp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["conflictPolicy", "resources"]
              properties:
                conflictPolicy:
                  type: string
                  enum: ["manual", "tenant-wins", "host-wins"]
                driftDetection:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    interval:
                      type: string
                      description: Go-style duration (e.g. 30s, 5m, 1h).
                      pattern: '^[0-9]+(ms|s|m|h)$'
                explain:
                  type: object
                  properties:
                    recordDecisions:
                      type: boolean
                    retain:
                      type: integer
                      minimum: 0
                resources:
                  type: array
                  items:
                    type: object
                    required: ["apiVersion", "kind", "direction"]
                    properties:
                      apiVersion:
                        type: string
                        description: Core-group version (v1) or group/version (apps/v1). Validated so an unparseable entry cannot be silently dropped at sync time.
                        pattern: '^([a-z0-9]([a-z0-9.-]*[a-z0-9])?/)?v[0-9]+((alpha|beta)[0-9]+)?$'
                      kind:
                        type: string
                        pattern: '^[A-Z][A-Za-z0-9]*$'
                      direction:
                        type: string
                        enum: ["toHost", "fromHost", "bidirectional"]
                        x-kubernetes-validations:
                          - rule: "self == 'toHost'"
                            message: 'only "toHost" is implemented today; "fromHost" and "bidirectional" are on the roadmap and are rejected rather than silently skipped'

