apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: syncdecisions.tenantplane.io
spec:
  group: tenantplane.io
  scope: Namespaced
  names:
    plural: syncdecisions
    singular: syncdecision
    kind: SyncDecision
    shortNames:
      - sd
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    required: ["time", "action", "kind", "tenantNamespace", "tenantName", "hostNamespace", "hostName"]
                    properties:
                      time:
                        type: string
                        format: date-time
                      action:
                        type: string
                      kind:
                        type: string
                      tenantNamespace:
                        type: string
                      tenantName:
                        type: string
                      hostNamespace:
                        type: string
                      hostName:
                        type: string
                      reason:
                        type: string
                lastConverged:
                  type: object
                  description: Per host-object-name tenant/host resourceVersions the last time a bidirectional pair was confirmed to agree.
                  additionalProperties:
                    type: object
                    required: ["tenantResourceVersion", "hostResourceVersion"]
                    properties:
                      tenantResourceVersion:
                        type: string
                      hostResourceVersion:
                        type: string
